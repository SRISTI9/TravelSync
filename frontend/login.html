<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - TravelSync</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #f4c430;
    --gold-light: #ffd966;
    --bg: #0b0b0b;
    --card: #0f0f0f;
    --input-bg: #181818;
    --border: rgba(244,196,48,0.15);
    --text: #fff;
    --muted: rgba(255,255,255,0.45);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Animated background */
  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 50%, rgba(244,196,48,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 30%, rgba(244,196,48,0.04) 0%, transparent 60%);
  }

  .bg-grid {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image:
      linear-gradient(rgba(244,196,48,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(244,196,48,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Floating orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
    animation: float 8s ease-in-out infinite;
    z-index: 0;
  }
  .orb1 { width: 400px; height: 400px; background: #f4c430; top: -100px; left: -100px; animation-delay: 0s; }
  .orb2 { width: 300px; height: 300px; background: #ff9500; bottom: -80px; right: -80px; animation-delay: 3s; }
  .orb3 { width: 200px; height: 200px; background: #f4c430; top: 50%; right: 20%; animation-delay: 5s; }

  @keyframes float {
    0%, 100% { transform: translateY(0px) scale(1); }
    50% { transform: translateY(-30px) scale(1.05); }
  }

  /* Card */
  .card {
    position: relative;
    z-index: 1;
    width: 420px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 48px 44px;
    box-shadow:
      0 0 0 1px rgba(244,196,48,0.05),
      0 40px 80px rgba(0,0,0,0.6),
      0 0 60px rgba(244,196,48,0.04);
    animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Logo / Brand */
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 36px;
  }

  .brand-icon {
    width: 38px;
    height: 38px;
    background: var(--gold);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--gold);
    letter-spacing: 0.5px;
  }

  h2 {
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
    line-height: 1.2;
  }

  .subtitle {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 32px;
    font-weight: 300;
  }

  /* Input group */
  .input-group {
    margin-bottom: 18px;
    animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .input-group:nth-child(1) { animation-delay: 0.1s; }
  .input-group:nth-child(2) { animation-delay: 0.15s; }

  .input-group label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap .icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    opacity: 0.4;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .input-wrap input {
    width: 100%;
    padding: 14px 16px 14px 44px;
    background: var(--input-bg);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  }

  .input-wrap input:focus {
    border-color: rgba(244,196,48,0.4);
    background: #1e1e1e;
    box-shadow: 0 0 0 3px rgba(244,196,48,0.08);
  }

  .input-wrap input:focus + .icon,
  .input-wrap input:focus ~ .icon {
    opacity: 0.8;
  }

  .input-wrap input::placeholder { color: rgba(255,255,255,0.2); }

  /* Error message */
  .error-msg {
    display: none;
    background: rgba(255, 80, 80, 0.1);
    border: 1px solid rgba(255, 80, 80, 0.3);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 13px;
    color: #ff6b6b;
    margin-bottom: 18px;
    align-items: center;
    gap: 8px;
    animation: shake 0.4s ease;
  }

  .error-msg.show { display: flex; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }

  /* Button */
  .btn {
    width: 100%;
    padding: 16px;
    background: var(--gold);
    border: none;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #000;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
    letter-spacing: 0.3px;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
    border-radius: inherit;
  }

  .btn:hover {
    background: var(--gold-light);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(244,196,48,0.3);
  }

  .btn:active { transform: translateY(0); }

  .btn.loading {
    pointer-events: none;
    opacity: 0.8;
  }

  .btn.loading::before {
    content: '';
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0 20px;
    color: var(--muted);
    font-size: 12px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.08);
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 24px;
    font-size: 14px;
    color: var(--muted);
  }

  .footer a {
    color: var(--gold);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.2s;
  }

  .footer a:hover { color: var(--gold-light); }

  /* Input box-sizing fix */
  input { box-sizing: border-box; }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-grid"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="card">

  <div class="brand">
    <div class="brand-icon">✈️</div>
    <span class="brand-name">TravelSync</span>
  </div>

  <h2>Welcome back</h2>
  <p class="subtitle">Login to continue your journey</p>

  <div class="error-msg" id="errorMsg">
    <span>⚠️</span>
    <span id="errorText">Invalid email or password. Please try again.</span>
  </div>

  <div class="input-group">
    <label>Email Address</label>
    <div class="input-wrap">
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      <span class="icon">📧</span>
    </div>
  </div>

  <div class="input-group">
    <label>Password</label>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
      <span class="icon">🔒</span>
    </div>
  </div>

  <button class="btn" id="loginBtn" onclick="login()">Login to TravelSync</button>

  <div class="footer">
    New here? <a href="register.html">Create an account</a>
  </div>

</div>

<script>
async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const btn = document.getElementById("loginBtn");
  const errorMsg = document.getElementById("errorMsg");
  const errorText = document.getElementById("errorText");

  // Hide previous error
  errorMsg.classList.remove("show");

  // Basic validation
  if (!email || !password) {
    errorText.textContent = "Please fill in both email and password.";
    errorMsg.classList.add("show");
    return;
  }

  // Loading state
  btn.classList.add("loading");
  btn.textContent = "Logging in...";

  try {
    const res = await fetch("http://localhost:5000/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.success) {
      localStorage.setItem("token", data.token);
      localStorage.setItem("user", JSON.stringify(data.user));
      btn.textContent = "✅ Success! Redirecting...";
      setTimeout(() => window.location.href = "index.html", 800);
    } else {
      errorText.textContent = "Invalid email or password. Please try again.";
      errorMsg.classList.add("show");
      btn.classList.remove("loading");
      btn.textContent = "Login to TravelSync";
    }

  } catch (err) {
    errorText.textContent = "❌ Cannot connect to server. Make sure backend is running.";
    errorMsg.classList.add("show");
    btn.classList.remove("loading");
    btn.textContent = "Login to TravelSync";
  }
}

// Allow Enter key to submit
document.addEventListener("keydown", e => {
  if (e.key === "Enter") login();
});
</script>

</body>
</html>

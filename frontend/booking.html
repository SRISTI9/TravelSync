<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Book Trip | TravelSync</title>

<style>
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#0b0b0b;
  color:#fff;
}

.container{
  max-width:1200px;
  margin:80px auto;
  padding:50px;
  background:#000;
  border-radius:24px;
  display:grid;
  grid-template-columns:1.4fr 1fr;
  gap:40px;
}

h1{color:#f4c430;font-size:34px}
h3{color:#f4c430;margin-top:25px}
p{opacity:.9}

label{display:block;margin-top:16px;font-weight:600}
input,select{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#1a1a1a;
  color:#fff;
}

.price-box{
  background:#111;
  padding:35px;
  border-radius:22px;
  position:sticky;
  top:90px;
}

.total{
  font-size:26px;
  color:#f4c430;
  margin:25px 0;
  font-weight:800;
}

button{
  width:100%;
  padding:18px;
  background:#f4c430;
  border:none;
  border-radius:50px;
  font-size:17px;
  font-weight:800;
  cursor:pointer;
}

button:hover{background:#ffd966}

/* SEATS */
.seat-card{
  background:#141414;
  padding:20px;
  border-radius:18px;
  margin:20px 0;
}

.progress{
  width:100%;
  height:10px;
  background:#333;
  border-radius:20px;
  overflow:hidden;
  margin:10px 0;
}

.progress-fill{
  height:100%;
  background:#f4c430;
  width:0%;
  transition:.4s;
}

.names{font-size:13px;opacity:.85;line-height:1.6}

hr{
  border:none;
  height:1px;
  background:rgba(255,255,255,.15);
  margin:30px 0;
}
</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div>
<h1 id="tripTitle"></h1>
<p><b>Dates:</b> <span id="tripDates"></span></p>
<p><b>Duration:</b> <span id="tripDuration"></span></p>

<div class="seat-card">
  👥 <b><span id="seatCount"></span> / 20 seats filled</b>
  <div class="progress">
    <div class="progress-fill" id="seatBar"></div>
  </div>
  <div class="names" id="seatNames"></div>
</div>

<hr>

<label>Number of Travellers *</label>
<select id="travellerCount" onchange="renderTravellers()">
  <option value="1">1</option>
  <option value="2">2</option>
  <option value="3">3</option>
</select>

<div id="travellers"></div>
</div>

<!-- RIGHT -->
<div class="price-box">
<h2 style="color:#f4c430">Pricing</h2>

<label>Price (per person)</label>
<select id="price" onchange="updatePrice()"></select>

<p style="font-size:13px;margin-top:10px;">+ GST & taxes as applicable</p>
<div class="total" id="total"></div>

<button onclick="bookNow()">Proceed to Book</button>

<p style="font-size:12px;opacity:.6;text-align:center;margin-top:12px">
* Booking request only. Payment will be collected later.
</p>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
/* ================= TRIP DATA ================= */

const trips={
  bali:{
    title:"Bali & Gili Islands",
    dates:"14 Mar 2026 – 22 Mar 2026",
    duration:"9 Days",
    price:53000,
    api:"book-bali",
    pdf:"TravelSync_Bali_Booking.pdf",
    itinerary:[
      "Day 1: Arrival, welcome dinner & nightlife",
      "Day 2: Uluwatu Temple & Kecak Dance",
      "Day 3: Nusa Penida island tour",
      "Day 4: Gili Islands – snorkeling & beach clubs",
      "Day 5: Leisure & farewell dinner"
    ]
  },
  paris:{
    title:"Paris",
    dates:"April 2026",
    duration:"8 Days",
    price:79000,
    api:"book-paris",
    pdf:"TravelSync_Paris_Booking.pdf",
    itinerary:[
      "Arrival & Eiffel Tower walk",
      "Louvre Museum & city tour",
      "Montmartre & art walk",
      "Seine River Cruise",
      "Free exploration & departure"
    ]
  },
  goa:{
    title:"Goa",
    dates:"March 2026",
    duration:"5 Days",
    price:29999,
    api:"book-goa",
    pdf:"TravelSync_Goa_Booking.pdf",
    itinerary:[
      "Arrival & beach shacks",
      "Water sports",
      "Nightlife & clubs",
      "Dolphin watching & Mandovi cruise",
      "Leisure & departure"
    ]
  }
};

const params=new URLSearchParams(location.search);
const tripKey=params.get("trip")||"bali";
const trip=trips[tripKey];

/* ================= SEATS (STATIC DEMO) ================= */

let maxSeats=20;
let filledSeats=12;
let bookedNames=[
  "Aarav","Isha","Rohan","Meera","Karan","Ananya",
  "Siddharth","Pooja","Nikhil","Sneha","Rahul","Tanya"
];

function renderSeats(){
  seatCount.innerText=filledSeats;
  seatBar.style.width=(filledSeats/maxSeats*100)+"%";
  seatNames.innerText=bookedNames.join(", ");
}

/* ================= INIT ================= */

tripTitle.innerText="Book "+trip.title;
tripDates.innerText=trip.dates;
tripDuration.innerText=trip.duration;
price.innerHTML=`<option value="${trip.price}">₹${trip.price} per person</option>`;

renderSeats();
renderTravellers();
updatePrice();

/* ================= TRAVELLERS ================= */

function renderTravellers(){
  travellers.innerHTML="";
  for(let i=1;i<=travellerCount.value;i++){
    travellers.innerHTML+=`
      <hr>
      <h3>Traveller ${i}</h3>
      <label>Full Name *</label><input class="t-name">
      <label>Email *</label><input class="t-email">
      <label>Phone *</label><input class="t-phone">
      <label>Age *</label><input class="t-age" type="number">
    `;
  }
}

function updatePrice(){
  total.innerText="Total: ₹"+(trip.price*travellerCount.value);
}

/* ================= BOOK ================= */

async function bookNow(){
  const names=[...document.querySelectorAll(".t-name")];
  const emails=[...document.querySelectorAll(".t-email")];
  const phones=[...document.querySelectorAll(".t-phone")];
  const ages=[...document.querySelectorAll(".t-age")];

  let travellersArr=[];

  for(let i=0;i<names.length;i++){
    if(!names[i].value||!emails[i].value||!phones[i].value||!ages[i].value){
      alert("Fill all traveller details");
      return;
    }
    travellersArr.push({
      name:names[i].value,
      email:emails[i].value,
      phone:phones[i].value,
      age:ages[i].value
    });
  }

  travellersArr.forEach(t=>bookedNames.push(t.name));
  filledSeats+=travellersArr.length;
  renderSeats();

  /* PDF */
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF();

  pdf.text("TravelSync – Booking Confirmation",20,20);
  pdf.text(`Trip: ${trip.title}`,20,35);
  pdf.text(`Dates: ${trip.dates}`,20,45);
  pdf.text(`Total Travellers: ${travellersArr.length}`,20,55);
  pdf.text(`Total Price: ₹${trip.price*travellersArr.length}`,20,65);

  let y=85;
  pdf.text("Traveller Details:",20,y); y+=10;
  travellersArr.forEach((t,i)=>{
    pdf.text(`${i+1}. ${t.name} | ${t.age} | ${t.email}`,20,y);
    y+=8;
  });

  y+=10;
  pdf.text("Itinerary:",20,y); y+=10;
  trip.itinerary.forEach(d=>{
    pdf.text("- "+d,20,y);
    y+=8;
  });

  pdf.save(trip.pdf);

  /* BACKEND */
  try{
    const res=await fetch(`http://localhost:5000/${trip.api}`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        trip:trip.title,
        travellers:travellersArr,
        itinerary:trip.itinerary,
        totalPrice:trip.price*travellersArr.length
      })
    });

    const result=await res.json();

    if(result.success){
      alert("✅ Booking confirmed! PDF downloaded & email sent 📧");
    }else{
      alert("Saved, but email failed.");
    }

  }catch(err){
    alert("❌ Backend not running");
  }
}
</script>

</body>
</html>

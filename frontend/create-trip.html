<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Trip | TravelSync</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --gold: #f4c430; --gold-light: #ffd966; --bg: #0b0b0b; --card: #0f0f0f; --input-bg: #181818; --muted: rgba(255,255,255,0.5); }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: #fff; min-height: 100vh; }

nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(11,11,11,0.95); backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(244,196,48,0.1);
  padding: 0 48px; display: flex; align-items: center;
  justify-content: space-between; height: 68px;
}
.nav-brand { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--gold); text-decoration: none; }
.nav-links { display: flex; align-items: center; gap: 8px; }
.nav-links a { color: rgba(255,255,255,0.7); text-decoration: none; padding: 8px 16px; border-radius: 50px; font-size: 14px; transition: all 0.2s; }
.nav-links a:hover { color: #fff; background: rgba(255,255,255,0.08); }

.page { max-width: 760px; margin: 60px auto; padding: 0 24px 80px; }

.page-header { margin-bottom: 40px; }
.page-header h1 { font-family: 'Playfair Display', serif; font-size: 38px; margin-bottom: 8px; }
.page-header h1 span { color: var(--gold); }
.page-header p { color: var(--muted); font-size: 16px; }

.card {
  background: var(--card); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 24px; padding: 36px; margin-bottom: 24px;
}
.card h2 { font-size: 18px; color: var(--gold); margin-bottom: 24px; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.form-grid .full { grid-column: span 2; }

.field { display: flex; flex-direction: column; gap: 8px; }
.field label { font-size: 12px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

.field input, .field select, .field textarea {
  padding: 13px 16px;
  background: var(--input-bg);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px; color: #fff;
  font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none;
  transition: border-color 0.2s;
  appearance: none;
  -webkit-appearance: none;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: rgba(244,196,48,0.4); background: #1e1e1e;
}
.field input::placeholder, .field textarea::placeholder { color: rgba(255,255,255,0.2); }
.field select option { background: #1a1a1a; color: #fff; }
.field textarea { resize: vertical; min-height: 100px; }

.select-wrap { position: relative; }
.select-wrap::after {
  content: '▾'; position: absolute; right: 16px; top: 50%;
  transform: translateY(-50%); color: var(--muted);
  pointer-events: none; font-size: 14px;
}

.ai-header {
  display: flex; justify-content: space-between;
  align-items: center; margin-bottom: 20px;
}
.ai-header h2 { margin-bottom: 0; }

.ai-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 20px; background: rgba(244,196,48,0.1);
  border: 1px solid rgba(244,196,48,0.3); border-radius: 50px;
  color: var(--gold); font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: all 0.2s; white-space: nowrap;
}
.ai-btn:hover { background: var(--gold); color: #000; }
.ai-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.ai-btn .spinner {
  width: 14px; height: 14px; border: 2px solid rgba(244,196,48,0.3);
  border-top-color: var(--gold); border-radius: 50%;
  animation: spin 0.7s linear infinite; display: none;
}
.ai-btn.loading .spinner { display: block; }
.ai-btn.loading .btn-text { opacity: 0.6; }
@keyframes spin { to { transform: rotate(360deg); } }

.ai-hint {
  font-size: 12px; color: var(--muted);
  margin-bottom: 16px; padding: 10px 14px;
  background: rgba(244,196,48,0.04);
  border: 1px solid rgba(244,196,48,0.1);
  border-radius: 10px;
}

.itinerary-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }

.itinerary-item {
  display: flex; align-items: flex-start; gap: 12px;
  background: #181818; padding: 14px 16px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.05);
  transition: border-color 0.2s;
}
.itinerary-item:focus-within { border-color: rgba(244,196,48,0.3); }

.day-num {
  color: var(--gold); font-weight: 700;
  font-size: 13px; min-width: 52px; padding-top: 3px;
}

.itinerary-item textarea {
  flex: 1; background: transparent; border: none;
  color: #fff; font-family: 'DM Sans', sans-serif;
  font-size: 14px; outline: none; resize: none;
  min-height: 40px; line-height: 1.5;
}

.itinerary-item .del-btn {
  background: none; border: none;
  color: rgba(255,100,100,0.5); cursor: pointer;
  font-size: 16px; padding: 2px; flex-shrink: 0;
  transition: color 0.2s;
}
.itinerary-item .del-btn:hover { color: #ff6b6b; }

.add-day-row { display: flex; gap: 10px; }
.add-day-row input {
  flex: 1; padding: 12px 16px;
  background: #181818; border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px; color: #fff;
  font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
}
.add-day-row input:focus { border-color: rgba(244,196,48,0.4); }
.add-day-row button {
  padding: 12px 20px; background: rgba(244,196,48,0.1);
  border: 1px solid rgba(244,196,48,0.3); border-radius: 12px;
  color: var(--gold); font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: all 0.2s; white-space: nowrap;
}
.add-day-row button:hover { background: var(--gold); color: #000; }

.error-msg {
  display: none; background: rgba(255,80,80,0.1);
  border: 1px solid rgba(255,80,80,0.3); border-radius: 12px;
  padding: 12px 16px; font-size: 13px; color: #ff6b6b;
  margin-bottom: 16px; align-items: center; gap: 8px;
}
.error-msg.show { display: flex; }

.success-msg {
  display: none; background: rgba(34,197,94,0.1);
  border: 1px solid rgba(34,197,94,0.3); border-radius: 12px;
  padding: 12px 16px; font-size: 13px; color: #4ade80;
  margin-bottom: 16px; align-items: center; gap: 8px;
}
.success-msg.show { display: flex; }

.submit-btn {
  width: 100%; padding: 18px;
  background: var(--gold); border: none;
  border-radius: 50px; font-family: 'DM Sans', sans-serif;
  font-size: 17px; font-weight: 700; color: #000;
  cursor: pointer; transition: all 0.2s; margin-top: 8px;
}
.submit-btn:hover { background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(244,196,48,0.3); }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">✈️ TravelSync</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="index.html#trips">Trips</a>
    <a href="dashboard.html">My Dashboard</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>
</nav>

<div class="page">

  <div class="page-header">
    <h1>Create a <span>Trip</span></h1>
    <p>Plan your own group trip and invite others to join.</p>
  </div>

  <div class="error-msg" id="errMsg">⚠️ <span id="errText"></span></div>
  <div class="success-msg" id="successMsg">🎉 <span id="successText"></span></div>

  <!-- TRIP DETAILS -->
  <div class="card">
    <h2>🗺️ Trip Details</h2>
    <div class="form-grid">

      <div class="field full">
        <label>Destination</label>
        <div class="select-wrap">
          <select id="destination">
            <option value="" disabled selected>Select a destination...</option>
            <optgroup label="🇮🇳 Indian Destinations">
              <option>Goa</option>
              <option>Manali</option>
              <option>Ladakh</option>
              <option>Kerala</option>
              <option>Jaipur</option>
              <option>Rishikesh</option>
              <option>Andaman & Nicobar</option>
              <option>Ooty</option>
              <option>Udaipur</option>
              <option>Varanasi</option>
              <option>Coorg</option>
              <option>Munnar</option>
              <option>Darjeeling</option>
              <option>Spiti Valley</option>
              <option>Hampi</option>
              <option>Meghalaya</option>
              <option>Kashmir Valley</option>
              <option>Pushkar</option>
            </optgroup>
            <optgroup label="🌍 International Destinations">
              <option>Bali, Indonesia</option>
              <option>Paris, France</option>
              <option>Dubai, UAE</option>
              <option>Japan</option>
              <option>Thailand</option>
              <option>Maldives</option>
              <option>Switzerland</option>
              <option>London, UK</option>
              <option>New York, USA</option>
              <option>Rome, Italy</option>
              <option>Singapore</option>
              <option>Vietnam</option>
              <option>Nepal</option>
              <option>Sri Lanka</option>
              <option>Portugal</option>
              <option>Greece</option>
              <option>Morocco</option>
              <option>New Zealand</option>
            </optgroup>
            <optgroup label="✏️ Other">
              <option value="__custom__">Type my own destination...</option>
            </optgroup>
          </select>
        </div>
        <input type="text" id="customDestination" placeholder="Enter destination name..."
          style="display:none; margin-top:10px;">
      </div>

      <div class="field">
        <label>Start Date</label>
        <input type="date" id="start_date">
      </div>
      <div class="field">
        <label>End Date</label>
        <input type="date" id="end_date">
      </div>
      <div class="field">
        <label>Budget per person (₹)</label>
        <input type="number" id="budget" placeholder="e.g. 15000">
      </div>
      <div class="field">
        <label>Max Seats</label>
        <input type="number" id="max_seats" placeholder="e.g. 20" value="20">
      </div>
      <div class="field full">
        <label>Description</label>
        <textarea id="description" placeholder="Describe the trip vibe, what's included, highlights..."></textarea>
      </div>
    </div>
  </div>

  <!-- ITINERARY -->
  <div class="card">
    <div class="ai-header">
      <h2>📅 Itinerary</h2>
      <button class="ai-btn" id="aiBtn" onclick="generateAIItinerary()">
        <div class="spinner"></div>
        <span class="btn-text">✨ Generate with AI</span>
      </button>
    </div>

    <div class="ai-hint" id="aiHint">
      Select a destination and dates first, then click <b>Generate with AI</b> to auto-create a day-by-day itinerary. You can edit it after!
    </div>

    <div class="itinerary-list" id="itineraryList"></div>

    <div class="add-day-row">
      <input type="text" id="newDay" placeholder="Or manually add a day activity...">
      <button onclick="addDay()">+ Add Day</button>
    </div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="createTrip()">🚀 Publish Trip</button>

</div>

<script>
const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user") || "null");

if (!token || !user) {
  alert("You need to login to create a trip.");
  window.location.href = "login.html";
}

function logout() {
  localStorage.removeItem("token");
  localStorage.removeItem("user");
  window.location.href = "login.html";
}

document.getElementById("destination").addEventListener("change", function() {
  const custom = document.getElementById("customDestination");
  custom.style.display = this.value === "__custom__" ? "block" : "none";
});

document.getElementById("newDay").addEventListener("keydown", e => {
  if (e.key === "Enter") addDay();
});

let itinerary = [];

function addDay(text = null) {
  const input = document.getElementById("newDay");
  const val = text || input.value.trim();
  if (!val) return;
  itinerary.push(val);
  if (!text) input.value = "";
  renderItinerary();
}

function removeDay(i) {
  itinerary.splice(i, 1);
  renderItinerary();
}

function updateDay(i, val) {
  itinerary[i] = val;
}

function renderItinerary() {
  document.getElementById("itineraryList").innerHTML = itinerary.map((day, i) => `
    <div class="itinerary-item">
      <span class="day-num">Day ${i + 1}</span>
      <textarea oninput="updateDay(${i}, this.value)">${day}</textarea>
      <button class="del-btn" onclick="removeDay(${i})">🗑</button>
    </div>`).join("");
}

/* ===== AI ITINERARY — GEMINI ===== */
async function generateAIItinerary() {
  const destSelect = document.getElementById("destination");
  const customDest = document.getElementById("customDestination").value.trim();
  const destination = destSelect.value === "__custom__" ? customDest : destSelect.value;
  const startDate = document.getElementById("start_date").value;
  const endDate = document.getElementById("end_date").value;

  if (!destination || destination === "") {
    showError("Please select a destination first."); return;
  }
  if (!startDate || !endDate) {
    showError("Please select start and end dates first."); return;
  }

  const start = new Date(startDate);
  const end = new Date(endDate);
  const days = Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1;

  if (days <= 0 || days > 30) {
    showError("Please select valid dates (max 30 days)."); return;
  }

  const GEMINI_API_KEY = "AIzaSyBSyl00p-RszwqQQS2kuxJteyVJNJ0VD18"; // 👈 paste your new key here

  const btn = document.getElementById("aiBtn");
  btn.disabled = true;
  btn.classList.add("loading");
  btn.querySelector(".btn-text").textContent = "Generating...";
  document.getElementById("aiHint").textContent = `✨ AI is crafting a ${days}-day itinerary for ${destination}...`;
  hideMessages();

  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{
            parts: [{
              text: `Create a ${days}-day group travel itinerary for ${destination}.
Return ONLY a JSON array, no markdown, no backticks, no extra text whatsoever.
Each item = one short exciting sentence describing that day's activities.
Example format: ["Day 1: Arrive and explore the beaches", "Day 2: Visit temples and local markets"]
Make it fun, specific to ${destination}, for young travelers aged 18-35.`
            }]
          }]
        })
      }
    );

    const data = await response.json();

    if (data.error) {
      showError("Gemini API error: " + data.error.message);
      btn.disabled = false;
      btn.classList.remove("loading");
      btn.querySelector(".btn-text").textContent = "✨ Generate with AI";
      return;
    }

    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
    const clean = text.replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(clean);

    if (Array.isArray(parsed) && parsed.length > 0) {
      itinerary = parsed;
      renderItinerary();
      document.getElementById("aiHint").innerHTML = `✅ AI generated ${parsed.length} days! <b>Click on any day to edit it.</b>`;
      showSuccess(`${parsed.length}-day itinerary generated for ${destination}! Edit as needed.`);
    } else {
      showError("Unexpected response. Try again or add days manually.");
    }

  } catch (err) {
    console.error(err);
    showError("AI generation failed. Add itinerary manually.");
    document.getElementById("aiHint").textContent = "AI generation failed. Add days manually below.";
  }

  btn.disabled = false;
  btn.classList.remove("loading");
  btn.querySelector(".btn-text").textContent = "✨ Regenerate with AI";
}

/* ===== CREATE TRIP ===== */
async function createTrip() {
  const destSelect = document.getElementById("destination");
  const customDest = document.getElementById("customDestination").value.trim();
  const destination = destSelect.value === "__custom__" ? customDest : destSelect.value;
  const start_date  = document.getElementById("start_date").value;
  const end_date    = document.getElementById("end_date").value;
  const budget      = document.getElementById("budget").value;
  const max_seats   = document.getElementById("max_seats").value || 20;
  const description = document.getElementById("description").value.trim();

  hideMessages();

  if (!destination || destination === "" || destination === "__custom__") {
    showError("Please select or enter a destination."); return;
  }
  if (!start_date || !end_date) {
    showError("Please select start and end dates."); return;
  }
  if (!budget) {
    showError("Please enter a budget per person."); return;
  }
  if (new Date(end_date) <= new Date(start_date)) {
    showError("End date must be after start date."); return;
  }

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.textContent = "Publishing...";

  let fullDescription = description;
  if (itinerary.length > 0) {
    fullDescription += "\n\nItinerary:\n" + itinerary.map((d, i) => `Day ${i+1}: ${d}`).join("\n");
  }

  try {
    const res = await fetch("http://localhost:5000/trips/create", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + token
      },
      body: JSON.stringify({
        destination,
        start_date,
        end_date,
        budget,
        max_seats,
        description: fullDescription
      })
    });

    const data = await res.json();

    if (data.success) {
      showSuccess("🎉 Trip published successfully!");
      btn.textContent = "✅ Published!";
      setTimeout(() => window.location.href = "dashboard.html", 1500);
    } else {
      showError(data.message || "Failed to create trip.");
      btn.disabled = false;
      btn.textContent = "🚀 Publish Trip";
    }

  } catch (err) {
    showError("❌ Cannot connect to server. Make sure backend is running.");
    btn.disabled = false;
    btn.textContent = "🚀 Publish Trip";
  }
}

function showError(msg) {
  document.getElementById("errText").textContent = msg;
  document.getElementById("errMsg").classList.add("show");
  document.getElementById("successMsg").classList.remove("show");
}
function showSuccess(msg) {
  document.getElementById("successText").textContent = msg;
  document.getElementById("successMsg").classList.add("show");
  document.getElementById("errMsg").classList.remove("show");
}
function hideMessages() {
  document.getElementById("errMsg").classList.remove("show");
  document.getElementById("successMsg").classList.remove("show");
}
</script>
</body>
</html>

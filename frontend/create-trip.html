<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Trip | TravelSync</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --gold: #f4c430; --gold-light: #ffd966; --bg: #0b0b0b; --card: #0f0f0f; --input-bg: #181818; --muted: rgba(255,255,255,0.5); }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: #fff; min-height: 100vh; }

nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(11,11,11,0.95); backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(244,196,48,0.1);
  padding: 0 48px; display: flex; align-items: center;
  justify-content: space-between; height: 68px;
}
.nav-brand { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--gold); text-decoration: none; }
.nav-links { display: flex; align-items: center; gap: 8px; }
.nav-links a { color: rgba(255,255,255,0.7); text-decoration: none; padding: 8px 16px; border-radius: 50px; font-size: 14px; transition: all 0.2s; }
.nav-links a:hover { color: #fff; background: rgba(255,255,255,0.08); }

.page { max-width: 760px; margin: 60px auto; padding: 0 24px 80px; }
.page-header { margin-bottom: 40px; }
.page-header h1 { font-family: 'Playfair Display', serif; font-size: 38px; margin-bottom: 8px; }
.page-header h1 span { color: var(--gold); }
.page-header p { color: var(--muted); font-size: 16px; }

.card { background: var(--card); border: 1px solid rgba(255,255,255,0.06); border-radius: 24px; padding: 36px; margin-bottom: 24px; }
.card h2 { font-size: 18px; color: var(--gold); margin-bottom: 24px; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.form-grid .full { grid-column: span 2; }
.field { display: flex; flex-direction: column; gap: 8px; }
.field label { font-size: 12px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.field input, .field select, .field textarea {
  padding: 13px 16px; background: var(--input-bg);
  border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; color: #fff;
  font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none;
  transition: border-color 0.2s; appearance: none; -webkit-appearance: none;
}
.field input:focus, .field select:focus, .field textarea:focus { border-color: rgba(244,196,48,0.4); background: #1e1e1e; }
.field input::placeholder, .field textarea::placeholder { color: rgba(255,255,255,0.2); }
.field select option { background: #1a1a1a; color: #fff; }
.field textarea { resize: vertical; min-height: 100px; }
.select-wrap { position: relative; }
.select-wrap::after { content: '▾'; position: absolute; right: 16px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; font-size: 14px; }

/* AI HEADER */
.ai-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.ai-header h2 { margin-bottom: 0; }
.ai-btn-group { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }

.ai-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 20px; background: rgba(244,196,48,0.1);
  border: 1px solid rgba(244,196,48,0.3); border-radius: 50px;
  color: var(--gold); font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.ai-btn:hover { background: var(--gold); color: #000; }
.ai-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.ai-btn .spinner { width: 14px; height: 14px; border: 2px solid rgba(244,196,48,0.3); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
.ai-btn.loading .spinner { display: block; }
.ai-btn.loading .btn-text { opacity: 0.6; }
@keyframes spin { to { transform: rotate(360deg); } }

/* PRESET BUTTON + DROPDOWN */
.preset-wrap { position: relative; }
.preset-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 18px; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.12); border-radius: 50px;
  color: rgba(255,255,255,0.75); font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.preset-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
.preset-dropdown {
  display: none; position: absolute; right: 0; top: calc(100% + 8px);
  background: #1c1c1c; border: 1px solid rgba(255,255,255,0.1);
  border-radius: 18px; padding: 10px; min-width: 270px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.7); z-index: 999;
  max-height: 340px; overflow-y: auto;
}
.preset-dropdown.open { display: block; animation: fadeUp 0.18s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
.preset-search {
  width: 100%; padding: 9px 13px; background: #111;
  border: 1px solid rgba(255,255,255,0.07); border-radius: 10px;
  color: #fff; font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; margin-bottom: 8px;
}
.preset-search::placeholder { color: rgba(255,255,255,0.3); }
.preset-group-label { font-size: 10px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1.2px; padding: 6px 10px 3px; font-weight: 600; }
.preset-option {
  padding: 9px 12px; border-radius: 10px; cursor: pointer;
  font-size: 13px; color: rgba(255,255,255,0.8); transition: all 0.15s;
  display: flex; align-items: center; gap: 8px;
}
.preset-option:hover { background: rgba(244,196,48,0.1); color: var(--gold); }

/* HINT */
.ai-hint { font-size: 12px; color: var(--muted); margin-bottom: 16px; padding: 10px 14px; background: rgba(244,196,48,0.04); border: 1px solid rgba(244,196,48,0.1); border-radius: 10px; }

/* ITINERARY */
.itinerary-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.itinerary-item { display: flex; align-items: flex-start; gap: 12px; background: #181818; padding: 14px 16px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.05); transition: border-color 0.2s; }
.itinerary-item:focus-within { border-color: rgba(244,196,48,0.3); }
.day-num { color: var(--gold); font-weight: 700; font-size: 13px; min-width: 52px; padding-top: 3px; }
.itinerary-item textarea { flex: 1; background: transparent; border: none; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; resize: none; min-height: 40px; line-height: 1.5; }
.itinerary-item .del-btn { background: none; border: none; color: rgba(255,100,100,0.5); cursor: pointer; font-size: 16px; padding: 2px; flex-shrink: 0; transition: color 0.2s; }
.itinerary-item .del-btn:hover { color: #ff6b6b; }

.add-day-row { display: flex; gap: 10px; }
.add-day-row input { flex: 1; padding: 12px 16px; background: #181818; border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; }
.add-day-row input:focus { border-color: rgba(244,196,48,0.4); }
.add-day-row button { padding: 12px 20px; background: rgba(244,196,48,0.1); border: 1px solid rgba(244,196,48,0.3); border-radius: 12px; color: var(--gold); font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; white-space: nowrap; }
.add-day-row button:hover { background: var(--gold); color: #000; }

.error-msg { display: none; background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.3); border-radius: 12px; padding: 12px 16px; font-size: 13px; color: #ff6b6b; margin-bottom: 16px; align-items: center; gap: 8px; }
.error-msg.show { display: flex; }
.success-msg { display: none; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); border-radius: 12px; padding: 12px 16px; font-size: 13px; color: #4ade80; margin-bottom: 16px; align-items: center; gap: 8px; }
.success-msg.show { display: flex; }

.submit-btn { width: 100%; padding: 18px; background: var(--gold); border: none; border-radius: 50px; font-family: 'DM Sans', sans-serif; font-size: 17px; font-weight: 700; color: #000; cursor: pointer; transition: all 0.2s; margin-top: 8px; }
.submit-btn:hover { background: var(--gold-light); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(244,196,48,0.3); }
.submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">✈️ TravelSync</a>
  <div class="nav-links">
    <a href="index.html">Home</a>

<div class="page">
  <div class="page-header">
    <h1>Create a <span>Trip</span></h1>
    <p>Plan your own group trip and invite others to join.</p>
  </div>

  <div class="error-msg" id="errMsg">⚠️ <span id="errText"></span></div>
  <div class="success-msg" id="successMsg">🎉 <span id="successText"></span></div>

  <!-- TRIP DETAILS -->
  <div class="card">
    <h2>🗺️ Trip Details</h2>
    <div class="form-grid">
      <div class="field full">
        <label>Destination</label>
        <div class="select-wrap">
          <select id="destination">
            <option value="" disabled selected>Select a destination...</option>
            <optgroup label="🇮🇳 Indian Destinations">
              <option>Goa</option><option>Manali</option><option>Ladakh</option>
              <option>Kerala</option><option>Jaipur</option><option>Rishikesh</option>
              <option>Andaman &amp; Nicobar</option><option>Ooty</option><option>Udaipur</option>
              <option>Varanasi</option><option>Coorg</option><option>Munnar</option>
              <option>Darjeeling</option><option>Spiti Valley</option><option>Hampi</option>
              <option>Meghalaya</option><option>Kashmir Valley</option><option>Pushkar</option>
            </optgroup>
            <optgroup label="🌍 International Destinations">
              <option>Bali, Indonesia</option><option>Paris, France</option><option>Dubai, UAE</option>
              <option>Japan</option><option>Thailand</option><option>Maldives</option>
              <option>Switzerland</option><option>London, UK</option><option>New York, USA</option>
              <option>Rome, Italy</option><option>Singapore</option><option>Vietnam</option>
              <option>Nepal</option><option>Sri Lanka</option><option>Portugal</option>
              <option>Greece</option><option>Morocco</option><option>New Zealand</option>
            </optgroup>
            <optgroup label="✏️ Other">
              <option value="__custom__">Type my own destination...</option>
            </optgroup>
          </select>
        </div>
        <input type="text" id="customDestination" placeholder="Enter destination name..." style="display:none; margin-top:10px;">
      </div>
      <div class="field"><label>Start Date</label><input type="date" id="start_date"></div>
      <div class="field"><label>End Date</label><input type="date" id="end_date"></div>
      <div class="field"><label>Budget per person (₹)</label><input type="number" id="budget" placeholder="e.g. 15000"></div>
      <div class="field"><label>Max Seats</label><input type="number" id="max_seats" placeholder="e.g. 20" value="20"></div>
      <div class="field full">
        <label>Description</label>
        <textarea id="description" placeholder="Describe the trip vibe, what's included, highlights..."></textarea>
      </div>
    </div>
  </div>

  <!-- ITINERARY -->
  <div class="card">
    <div class="ai-header">
      <h2>📅 Itinerary</h2>
      <div class="ai-btn-group">
        <!-- Preset dropdown -->
        <div class="preset-wrap" id="presetWrap">
          <button class="preset-btn" onclick="togglePreset(event)">📋 Use Preset ▾</button>
          <div class="preset-dropdown" id="presetDropdown">
            <input class="preset-search" id="presetSearch" placeholder="🔍 Search destination..." oninput="filterPresets(this.value)">
            <div id="presetList"></div>
          </div>
        </div>
        <!-- AI button -->
        
      </div>
    </div>

    <div class="ai-hint" id="aiHint">
      Pick a destination &amp; dates, then hit <b>✨ Generate with AI</b> — or grab a quick starter with <b>📋 Use Preset</b>!
    </div>

    <div class="itinerary-list" id="itineraryList"></div>
    <div class="add-day-row">
      <input type="text" id="newDay" placeholder="Or manually add a day activity...">
      <button onclick="addDay()">+ Add Day</button>
    </div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="createTrip()">🚀 Publish Trip</button>
</div>

<script>
/* ─── AUTH ─────────────────────────────────────────── */
const token = localStorage.getItem("token");
const user  = JSON.parse(localStorage.getItem("user") || "null");
if (!token || !user) { alert("You need to login to create a trip."); window.location.href = "login.html"; }

function logout() {
  localStorage.removeItem("token");
  localStorage.removeItem("user");
  window.location.href = "login.html";
}

/* ─── DESTINATION ───────────────────────────────────── */
document.getElementById("destination").addEventListener("change", function() {
  document.getElementById("customDestination").style.display = this.value === "__custom__" ? "block" : "none";
});
document.getElementById("newDay").addEventListener("keydown", e => { if (e.key === "Enter") addDay(); });

/* ─── ITINERARY STATE ───────────────────────────────── */
let itinerary = [];
function addDay(text) {
  const input = document.getElementById("newDay");
  const val   = text !== undefined ? text : input.value.trim();
  if (!val) return;
  itinerary.push(val);
  if (text === undefined) input.value = "";
  renderItinerary();
}
function removeDay(i) { itinerary.splice(i, 1); renderItinerary(); }
function updateDay(i, val) { itinerary[i] = val; }
function renderItinerary() {
  document.getElementById("itineraryList").innerHTML = itinerary.map((day, i) => `
    <div class="itinerary-item">
      <span class="day-num">Day ${i + 1}</span>
      <textarea oninput="updateDay(${i}, this.value)">${day}</textarea>
      <button class="del-btn" onclick="removeDay(${i})">🗑</button>
    </div>`).join("");
}

const ALL_PRESETS = [];
Object.entries(PRESETS).forEach(([group, dests]) => {
  Object.entries(dests).forEach(([dest, days]) => ALL_PRESETS.push({ group, dest, days }));
});

function buildPresetList(filter) {
  filter = (filter || "").toLowerCase();
  const list     = document.getElementById("presetList");
  const filtered = filter ? ALL_PRESETS.filter(p => p.dest.toLowerCase().includes(filter)) : ALL_PRESETS;

  if (!filtered.length) {
    list.innerHTML = `<div style="padding:12px;color:var(--muted);font-size:13px;text-align:center">No match found</div>`;
    return;
  }
  const grouped = {};
  filtered.forEach(p => { (grouped[p.group] = grouped[p.group] || []).push(p); });
  list.innerHTML = Object.entries(grouped).map(([grp, items]) => `
    <div class="preset-group-label">${grp}</div>
    ${items.map(p => `
      <div class="preset-option" onclick="applyPreset('${p.dest.replace(/'/g,"\\'")}')">
        <span>${p.dest}</span>
        <span style="margin-left:auto;font-size:11px;color:var(--muted)">${p.days.length} days</span>
      </div>`).join("")}
  `).join("");
}
function filterPresets(val) { buildPresetList(val); }

function togglePreset(e) {
  e.stopPropagation();
  const dd = document.getElementById("presetDropdown");
  const opening = !dd.classList.contains("open");
  if (opening) { buildPresetList(); dd.classList.add("open"); setTimeout(() => document.getElementById("presetSearch").focus(), 50); }
  else dd.classList.remove("open");
}

function applyPreset(dest) {
  const preset = ALL_PRESETS.find(p => p.dest === dest);
  if (!preset) return;
  let days = [...preset.days];
  const s = document.getElementById("start_date").value;
  const e = document.getElementById("end_date").value;
  if (s && e) {
    const n = Math.ceil((new Date(e) - new Date(s)) / 86400000) + 1;
    if (n > 0 && n <= 30) {
      while (days.length < n) days.push(`Day ${days.length + 1}: Free day — explore at your own pace 🗺️`);
      days = days.slice(0, n);
    }
  }
  itinerary = days;
  renderItinerary();
  document.getElementById("presetDropdown").classList.remove("open");
  document.getElementById("aiHint").innerHTML = `✅ Preset for <b>${dest}</b> loaded (${days.length} days). Click any day to edit!`;
  showSuccess(`${days.length}-day preset itinerary for ${dest} applied! Customize as needed.`);
}

document.addEventListener("click", e => {
  if (!document.getElementById("presetWrap").contains(e.target))
    document.getElementById("presetDropdown").classList.remove("open");
});

/* ─── GROQ AI ITINERARY ─────────────────────────────── */


async function generateAIItinerary() {
  const destSelect  = document.getElementById("destination");
  const customDest  = document.getElementById("customDestination").value.trim();
  const destination = destSelect.value === "__custom__" ? customDest : destSelect.value;
  const startDate   = document.getElementById("start_date").value;
  const endDate     = document.getElementById("end_date").value;

  if (!destination) { showError("Please select a destination first."); return; }
  if (!startDate || !endDate) { showError("Please select start and end dates first."); return; }

  const days = Math.ceil((new Date(endDate) - new Date(startDate)) / 86400000) + 1;
  if (days <= 0 || days > 30) { showError("Please select valid dates (max 30 days)."); return; }

  const btn = document.getElementById("aiBtn");
  btn.disabled = true; btn.classList.add("loading");
  btn.querySelector(".btn-text").textContent = "Generating...";
  document.getElementById("aiHint").textContent = `✨ AI is crafting a ${days}-day itinerary for ${destination}...`;
  hideMessages();

  try {
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${GROQ_API_KEY}` },
      body: JSON.stringify({
        model: "llama3-8b-8192",
        messages: [
          {
            role: "system",
            content: "You are a travel expert. Respond ONLY with a raw JSON array of strings. No markdown, no backticks, no explanation whatsoever."
          },
          {
            role: "user",
            content: `Create a ${days}-day group travel itinerary for ${destination}. Return ONLY a JSON array of exactly ${days} strings. Each string is one exciting sentence about that day. Example: ["Day 1: Arrive and explore the beaches","Day 2: Visit temples"]. Specific to ${destination}, for Indian travelers aged 18-35.`
          }
        ],
        temperature: 0.8,
        max_tokens: 1024
      })
    });

    const data = await res.json();
    if (data.error) { showError("Groq API error: " + data.error.message); return; }

    let text = data.choices?.[0]?.message?.content || "";
    text = text.replace(/```json|```/gi, "").trim();
    const match = text.match(/\[[\s\S]*\]/);
    if (!match) throw new Error("No JSON array in response");

    const parsed = JSON.parse(match[0]);
    if (Array.isArray(parsed) && parsed.length > 0) {
      itinerary = parsed;
      renderItinerary();
      document.getElementById("aiHint").innerHTML = `✅ AI generated <b>${parsed.length} days</b> for ${destination}! Click any day to edit.`;
      showSuccess(`${parsed.length}-day AI itinerary generated! Edit as needed.`);
    } else {
      showError("Unexpected AI response. Try the 📋 Preset option instead.");
    }
  } catch (err) {
    console.error("Groq error:", err);
    showError("AI generation failed. Try the 📋 Preset option or add days manually.");
    document.getElementById("aiHint").textContent = "AI failed. Use presets or add days manually below.";
  } finally {
    btn.disabled = false; btn.classList.remove("loading");
    btn.querySelector(".btn-text").textContent = "✨ Regenerate with AI";
  }
}

/* ─── CREATE TRIP ───────────────────────────────────── */
async function createTrip() {
  const destSelect  = document.getElementById("destination");
  const customDest  = document.getElementById("customDestination").value.trim();
  const destination = destSelect.value === "__custom__" ? customDest : destSelect.value;
  const start_date  = document.getElementById("start_date").value;
  const end_date    = document.getElementById("end_date").value;
  const budget      = document.getElementById("budget").value;
  const max_seats   = document.getElementById("max_seats").value || 20;
  const description = document.getElementById("description").value.trim();
  hideMessages();

  if (!destination || destination === "__custom__") { showError("Please select or enter a destination."); return; }
  if (!start_date || !end_date) { showError("Please select start and end dates."); return; }
  if (!budget) { showError("Please enter a budget per person."); return; }
  if (new Date(end_date) <= new Date(start_date)) { showError("End date must be after start date."); return; }

  const btn = document.getElementById("submitBtn");
  btn.disabled = true; btn.textContent = "Publishing...";

  let fullDescription = description;
  if (itinerary.length > 0)
    fullDescription += "\n\nItinerary:\n" + itinerary.map((d, i) => `Day ${i+1}: ${d}`).join("\n");

  try {
    const res  = await fetch("http://localhost:5000/trips/create", {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
      body: JSON.stringify({ destination, start_date, end_date, budget, max_seats, description: fullDescription })
    });
    const data = await res.json();
    if (data.success) {
      showSuccess("🎉 Trip published successfully!");
      btn.textContent = "✅ Published!";
      localStorage.setItem("activeTab", "splits"); // open splits tab on dashboard
      setTimeout(() => window.location.href = "dashboard.html", 1500);
    } else {
      showError(data.message || "Failed to create trip.");
      btn.disabled = false; btn.textContent = "🚀 Publish Trip";
    }
  } catch (err) {
    showError("❌ Cannot connect to server. Make sure backend is running.");
    btn.disabled = false; btn.textContent = "🚀 Publish Trip";
  }
}

function showError(msg)   { document.getElementById("errText").textContent = msg; document.getElementById("errMsg").classList.add("show"); document.getElementById("successMsg").classList.remove("show"); }
function showSuccess(msg) { document.getElementById("successText").textContent = msg; document.getElementById("successMsg").classList.add("show"); document.getElementById("errMsg").classList.remove("show"); }
function hideMessages()   { document.getElementById("errMsg").classList.remove("show"); document.getElementById("successMsg").classList.remove("show"); }
</script>
